name: Snyk Dependency Scan

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  snyk-deps:
    name: Snyk dependency scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/requirements.txt

      - name: Install Snyk CLI
        run: npm install --global snyk

      - name: Detect missing Snyk token
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "SNYK_TOKEN secret is required for dependency scanning."
            exit 1
          fi

      - name: Scan frontend dependencies
        working-directory: frontend
        run: snyk test --file=package.json --severity-threshold=high

      - name: Scan backend dependencies
        working-directory: backend
        run: snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high
